name: Release

# Publishes a release when a version tag is pushed, e.g.:
#   make bump NEW_VERSION=0.1.73
#   git commit -am "Release v0.1.73" && git tag v0.1.73 && git push --tags
#
# Produces:
#   * Cross-compiled binaries (linux/windows, amd64/arm64) + SHA256SUMS
#     attached to a GitHub Release.
#   * Multi-arch container images pushed to Docker Hub, tagged with the
#     release version and :latest.
#
# The version is derived from the tag (v0.1.73 -> 0.1.73) and stamped into
# the binary (server.Version) and the embedded *-profiles.json via
# `make sync-profiles`, mirroring the local Makefile release flow.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create/attach GitHub Releases

env:
  IMAGE: garybowers/bootimus

jobs:
  binaries:
    name: Build & attach binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: make binaries VERSION=${{ steps.version.outputs.version }}

      - name: Generate checksums
        run: sha256sum bootimus-* > SHA256SUMS

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            bootimus-*
            SHA256SUMS

  docker:
    name: Build & push container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync embedded profile versions
        run: make sync-profiles VERSION=${{ steps.version.outputs.version }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
